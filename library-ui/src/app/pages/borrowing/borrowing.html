<div class="books-container">
  
  <div class="toolbar-section">
    <h2 class="page-title">Quản Lý Mượn & Trả Sách</h2>
    
    <div class="action-group">
      </div>
  </div>

  <div class="table-card-container">
    
    <div class="table-responsive-wrapper">
      
      <table mat-table [dataSource]="books" matSort class="mat-elevation-z0 custom-table">
        
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Tên sách </th>
          <td mat-cell *matCellDef="let book" class="title-cell"> {{book.title}} </td>
        </ng-container>

        <ng-container matColumnDef="author">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Tác giả </th>
          <td mat-cell *matCellDef="let book"> {{book.author}} </td>
        </ng-container>

        <ng-container matColumnDef="availableQuantity">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Sẵn có để mượn </th>
          <td mat-cell *matCellDef="let book"> 
            <span class="status-badge" [class.success]="book.availableQuantity > 0" [class.danger]="book.availableQuantity <= 0">
              {{ book.availableQuantity > 0 ? 'Còn ' + book.availableQuantity + ' cuốn' : 'Hết sách' }}
            </span> 
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Trạng thái </th>
          <td mat-cell *matCellDef="let book">
            <span class="status-badge" [class.success]="book.status === 'Available'" [class.danger]="book.status !== 'Available'">
              {{ book.status === 'Available' ? 'Có thể mượn' : 'Hết hàng' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="text-right"> Hành động </th> 
          <td mat-cell *matCellDef="let book" class="text-right">
            <div class="action-wrapper">
              <button mat-flat-button class="btn-action btn-borrow" 
                      [disabled]="book.availableQuantity <= 0" 
                      (click)="borrowBook(book)">
                <mat-icon>output</mat-icon> Mượn
              </button>
              
              <button mat-flat-button class="btn-action btn-return" 
                      (click)="returnBook(book)">
                <mat-icon>input</mat-icon> Trả
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row-hover"></tr>
      </table>

    </div> <mat-paginator 
      [pageSizeOptions]="[5, 10, 20]" 
      pageSize="5" 
      showFirstLastButtons
      aria-label="Phân trang mượn trả">
    </mat-paginator>

  </div>
</div>
